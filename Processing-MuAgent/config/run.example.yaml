# Example run configuration for Processing-MuAgent
# Fill in paths and re-save as run.yaml (or pass via --config).

# Where per-run state + artifacts will be written. REQUIRED.
run_dir: /Users/yunning/Desktop/MuAgene/example/output/run_example

# Inputs — at least one is required. Both required for `paired` / `separate`
# branches; supply only one for `rna_only` or `atac_only`.
#
# `rna_path` accepts either a Cell Ranger filtered matrix (default) OR a raw
# matrix. S0 autodetects raw vs filtered via barcode count and triggers a
# barcode-rank knee for cell calling on raw inputs.
#
# `rna_raw_path` (optional) is a companion raw-droplets matrix used by S1a
# SoupX to estimate the soup profile. S0 symlinks this path into the run dir
# (no copy). When BOTH `rna_path` (filtered) and `rna_raw_path` (raw) are
# supplied, the plan sets s1a_ambient.method=auto → SoupX. When only a
# filtered matrix is supplied, auto → DecontX.
#
# Study goal guides ambient correction strength at plan time (confirm at plan review):
#   rare_populations     → auto recommended (high confidence in plan)
#   clustering_inference → auto default (confirm; set none if contamination is low)
#
# Optional explicit override (skips plan heuristics):
# s1a_ambient_method: none   # auto | none | decontx | soupx
rna_path: /Users/yunning/Desktop/MuAgene/example/data/pbmc_3k_filtered_feature_bc_matrix.h5
# rna_raw_path: /path/to/raw_feature_bc_matrix.h5
atac_fragments_path: /Users/yunning/Desktop/MuAgene/example/data/pbmc_3k_atac_fragments.tsv.gz

# Genome assembly (REQUIRED; no default)
genome_assembly: GRCh38

# Study goal — guides S1a ambient correction recommendation and S3 doublet policy.
# One of: clustering_inference | rare_populations | <absent>
study_goal: clustering_inference

# Optional metadata file (CSV or TSV). If absent, minimal reconstruction is used.
# metadata_path: /path/to/metadata.csv

# Optional Biological Context Report path. Defaults to <run_dir>/biological_context.md.
# biological_context_path: /path/to/biological_context.md

# Seed for reproducibility
seed: 42
