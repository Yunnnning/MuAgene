# SLURM Snakemake profile.
#
# Uses the generic cluster executor instead of snakemake-executor-plugin-slurm.
# This is deliberate: `Processing-MuAgent submit --executor slurm` runs the
# Snakemake orchestrator as a small SLURM head-job.  The native SLURM executor
# switches behavior when Snakemake itself is already inside a SLURM allocation
# and can execute children as job steps, which makes per-rule resources and
# output accounting unreliable on shared HPC filesystems.  The generic submit
# script always sends each non-local rule through `sbatch`.

executor: cluster-generic

cluster-generic-submit-cmd: >-
  ${PMA_REPO_ROOT}/workflow/profiles/slurm/slurm-submit.sh
  {rule} {jobid} {threads} {resources.mem_mb} {resources.runtime}

cluster-generic-status-cmd: ${PMA_REPO_ROOT}/workflow/profiles/slurm/slurm-status.sh

jobs: 8
max-jobs-per-second: 1
max-status-checks-per-second: 1
latency-wait: 300

# Snakemake 9 defaults shared-fs-usage to ALL (includes storage-local-copies).
# On this project's shared NFS, child jobs already write outputs to their final
# paths (executor/io.write_h5ad_safe). storage-local-copies triggers a remote
# post-job sync ("Storing output in storage.") that can hang while SLURM keeps
# the child RUNNING. Keep input-output on NFS; omit storage-local-copies.
shared-fs-usage:
  - persistence
  - input-output
  - software-deployment
  - software-deployment-cache
  - sources
  - source-cache

restart-times: 1
rerun-incomplete: true
keep-going: false

# Rerun a job only when its output is missing or older than an input (mtime), NOT
# on params/code/input-set/software-env changes. This pipeline forces reruns by
# EXPLICIT artifact deletion (executor revise -> _invalidate_qc_downstream), so the
# default content/input-set triggers only produce spurious reruns — e.g. editing a
# rule's input list would re-run an already-approved stage. mtime-only keeps
# Snakemake consistent with the explicit-invalidation model. Mirrored locally in
# executor.cli._snakemake.
rerun-triggers:
  - mtime

# Fallback resources for rules without their own (per-rule values are declared
# in resources.smk and inherited via the rule's resources: directive).
# runtime is in MINUTES (snakemake-standard; slurm-submit.sh passes it to sbatch).
default-resources:
  - mem_mb=4000
  - runtime=120

# Conda envs are not managed by snakemake in v1. The head-job runs inside the
# project env (`grn`); child rule jobs self-activate it because slurm-submit.sh
# injects a `conda activate "$PMA_CONDA_ENV"` block into each generated jobscript
# (see executor.hpc.inject_conda_activation_text). Without that, sbatch
# --export=ALL would propagate env *variables* but not the activated env, leaving
# env-local tools (bgzip/tabix) off PATH inside child jobs.
use-conda: false
