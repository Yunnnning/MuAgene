# SLURM Snakemake profile.
#
# Uses the generic cluster executor instead of snakemake-executor-plugin-slurm.
# This is deliberate: `Processing-MuAgent submit --executor slurm` runs the
# Snakemake orchestrator as a small SLURM head-job.  The native SLURM executor
# switches behavior when Snakemake itself is already inside a SLURM allocation
# and can execute children as job steps, which makes per-rule resources and
# output accounting unreliable on shared HPC filesystems.  The generic submit
# script always sends each non-local rule through `sbatch`.

executor: cluster-generic

cluster-generic-submit-cmd: >-
  ${PMA_REPO_ROOT}/workflow/profiles/slurm/slurm-submit.sh
  {rule} {jobid} {threads} {resources.mem_mb} {resources.runtime}

cluster-generic-status-cmd: ${PMA_REPO_ROOT}/workflow/profiles/slurm/slurm-status.sh

jobs: 8
max-jobs-per-second: 1
max-status-checks-per-second: 1
latency-wait: 300

restart-times: 1
rerun-incomplete: true
keep-going: false

# Fallback resources for rules without their own (per-rule values are declared
# in resources.smk and inherited via the rule's resources: directive).
# runtime is in MINUTES (snakemake-standard; slurm-submit.sh passes it to sbatch).
default-resources:
  - mem_mb=4000
  - runtime=120

# Conda envs are not managed by snakemake in v1 — the runner wrapper activates
# the project env (`grn`) and child jobs inherit it.
use-conda: false
