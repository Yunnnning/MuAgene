# Canonical CPU conda env for Processing-MuAgent. This YAML is the human SOURCE OF TRUTH
# for the CPU env; what actually installs is the conda-lock lock generated from it
# (workflow/envs/processing.linux-64.lock, linux-only). Execution-MuAgent provisions the
# env from that lock — `init-machine` (fresh machine) or `provision-env --device cpu` —
# its name comes from configure-execution --conda-env (default `muagene`). Do NOT create
# the env by hand. The GPU env is a separate, pull-only container (muagene-gpu.def).
#
# Edited this file? Regenerate + commit the lock (else validate-env/submit fail loud with
# lock_stale_vs_yaml):
#   Processing-MuAgent regenerate-locks        # runs conda-lock; needs: pip install '.[dev]'
#
# Notes:
# - This env is FULLY CONDA. The committed lock is rendered with `conda-lock --kind
#   explicit`, which is conda-only — so every dependency MUST be a conda package, never a
#   `pip:` subsection (those are silently dropped from an explicit lock). `regenerate-locks`
#   fails loud if a `pip:` block reappears here. The only pip use is `- pip` itself, so
#   `init-machine` can `pip install -e` the agent packages into the env.
# - Snakemake + the generic cluster executor plugin live here so the runner wrapper
#   doesn't need a separate snakemake env.
# - nbconvert + papermill are included for the S7 resolution-review notebook
#   deliverable.
# - R + DecontX (celda) + SoupX are required for S1a ambient correction on
#   RNA branches. Whether correction runs is decided by the preprocessing plan
#   (workflow branch, sample type, inputs) — not by optional R installs.
# - SoupX 1.6.2 (r-soupx) imports Seurat::Read10X in its NAMESPACE, so r-seurat
#   must be installed even though our soupx.R wrapper never calls Read10X.
#   If conda's env-solve OOM's, install r-seurat + r-ggplot2 + r-farver separately
#   via `mamba install -n muagene -c conda-forge r-seurat r-ggplot2 r-farver --no-deps`
#   after a minimal env create, then install transitive R deps as needed.
name: muagene
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.10,<3.13
  - r-base>=4.3
  - r-seurat
  - bioconductor-celda
  - r-soupx
  - pip
  - scanpy>=1.10
  - anndata>=0.10
  - mudata>=0.2
  - muon>=0.1
  - snapatac2>=2.6
  - scrublet>=0.2
  # htslib provides bgzip + tabix, required by executor/io.py to bgzip-compress
  # and index the chromosome-bound-filtered / chr-renamed ATAC fragments before
  # the SnapATAC2 import. Must be in the env (not just the base shell) so child
  # cluster jobs that activate $PMA_CONDA_ENV have them on PATH.
  - htslib
  - leidenalg>=0.10
  - umap-learn>=0.5
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - pyarrow>=14
  - pyyaml>=6
  - requests>=2.31
  - click>=8.1
  - jinja2>=3.1
  - matplotlib>=3.7
  - seaborn>=0.13
  # python-docx and pypdf are lazy-imported by executor/doc_ingest.py for .docx/.pdf ingestion
  - python-docx>=1.1
  - pypdf>=4
  - scikit-learn>=1.3
  - nbconvert>=7
  - papermill>=2.4
  - jupyter_client
  - ipykernel
  # Orchestrator + cluster executor plugin (conda, via bioconda) so the runner wrapper
  # needs no separate snakemake env. snakemake>=8 is required for the plugin-based
  # `--executor cluster-generic` interface used by scripts/launch_runner.sh.
  - snakemake-minimal>=8
  - snakemake-executor-plugin-cluster-generic
